<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONONO</title>
    <style>
        /* Reset and enforce canvas constraints */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d1a;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient glowing background */
        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,128,0.15) 0%, rgba(0,255,255,0.05) 50%, rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        /* Central Container */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Main massive pulsing text */
        .giant-no {
            font-size: 12vw;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f, 0 0 80px #ff007f;
            animation: pulse-glow 1.5s infinite ease-in-out alternate, glitch 0.4s infinite;
            user-select: none;
        }

        /* Sub-text container */
        .sub-no-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Bouncing sub-elements */
        .bounce-no {
            font-size: 4vw;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            user-select: none;
        }

        .bounce-no:nth-child(1) { animation: bounce 0.6s infinite alternate ease-in-out; }
        .bounce-no:nth-child(2) { animation: bounce 0.6s infinite alternate ease-in-out 0.2s; }
        .bounce-no:nth-child(3) { animation: bounce 0.6s infinite alternate ease-in-out 0.4s; }

        /* Navigation action button */
        .escape-button {
            margin-top: 50px;
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.2rem;
            color: #ffffff;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .escape-button:hover {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 0 25px #ff007f, 0 0 50px #7f00ff;
        }

        /* Background falling text elements */
        .matrix-no {
            position: absolute;
            color: rgba(255, 255, 255, 0.04);
            font-size: 2rem;
            pointer-events: none;
            user-select: none;
            z-index: 2;
            animation: fall linear infinite;
        }

        /* Animations */
        @keyframes pulse-glow {
            0% {
                transform: scale(0.95);
                text-shadow: 0 0 15px #ff007f, 0 0 30px #ff007f;
            }
            100% {
                transform: scale(1.05);
                text-shadow: 0 0 30px #ff007f, 0 0 60px #ff007f, 0 0 100px #ff007f;
            }
        }

        @keyframes glitch {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-2px, 2px) skew(-3deg); }
            40% { transform: translate(2px, -2px) skew(3deg); }
            60% { transform: translate(-1px, -1px) skew(1deg); }
            80% { transform: translate(2px, 1px) skew(-1deg); }
            100% { transform: translate(0) skew(0deg); }
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-30px); }
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <!-- Giant core message -->
        <h1 class="giant-no">NONONO</h1>
        
        <!-- Rhythmic bouncing companion elements -->
        <div class="sub-no-container">
            <div class="bounce-no">NO</div>
            <div class="bounce-no">NO</div>
            <div class="bounce-no">NO</div>
        </div>

        <!-- Safe exit navigation back home -->
        <a href="/" class="escape-button">Go Home</a>
    </div>

    <script>
        // Dynamically spawn falling, drifting background matrix elements
        const spawnCount = 40;
        for (let i = 0; i < spawnCount; i++) {
            const element = document.createElement('div');
            element.classList.add('matrix-no');
            element.innerText = 'NO';
            
            // Randomize position, size, and falling dynamics
            element.style.left = Math.random() * 100 + 'vw';
            element.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            element.style.opacity = Math.random() * 0.06;
            
            const duration = Math.random() * 8 + 4;
            const delay = Math.random() * -12;
            element.style.animationDuration = duration + 's';
            element.style.animationDelay = delay + 's';
            
            document.body.appendChild(element);
        }
    </script>
</body>
</html>
