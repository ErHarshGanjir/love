<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONONO</title>
    <style>
        /* Classic 80s arcade cabinet aesthetic styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05030a;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Classic grid overlay scanlines */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Ambient classic color vignette */
        .arcade-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(139, 0, 255, 0.3);
            z-index: 2;
            pointer-events: none;
        }

        .screen-wrapper {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        /* Classic block header style with a funky color cycle */
        .title-block {
            font-size: 8vw;
            font-weight: 900;
            color: #fff;
            letter-spacing: 10px;
            animation: color-shift 2s infinite linear;
            text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc;
            margin-bottom: 5px;
            user-select: none;
        }

        /* Subtitle marquee style text */
        .marquee-sub {
            font-size: 1.5rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            animation: text-flicker 1.5s infinite steps(2);
        }

        /* Funky arcade interactive machine button */
        .retry-btn {
            background: transparent;
            border: 4px solid #ff0055;
            color: #ff0055;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            transition: all 0.1s ease;
        }

        .retry-btn:hover {
            background-color: #ff0055;
            color: #05030a;
            box-shadow: 0 0 30px #ff0055;
            animation: button-shake 0.2s infinite;
        }

        .retry-btn:active {
            transform: scale(0.95);
        }

        /* JavaScript generated floating elements */
        .floating-no {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            user-select: none;
            animation: float-around 6s infinite linear;
        }

        /* Keyframe Animations */
        @keyframes color-shift {
            0% { text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffcc; }
            33% { text-shadow: -4px 4px 0px #00ffcc, 4px -4px 0px #ffff00; }
            66% { text-shadow: 4px -4px 0px #ffff00, -4px 4px 0px #ff0055; }
            100% { text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffcc; }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
            55% { opacity: 0.2; }
            60% { opacity: 0.7; }
        }

        @keyframes button-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 2px) rotate(-1deg); }
            75% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(1deg); }
        }

        @keyframes float-around {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="arcade-frame"></div>

    <div class="screen-wrapper">
        <!-- Classic Retro Styled Blocks -->
        <div class="title-block">NONONO</div>
        <div class="marquee-sub">● COMPROMISED SYSTEM ●</div>
        
        <!-- Interactive Non-Redirect Button -->
        <button class="retry-btn" onclick="injectChaos()">Insert Coin / Retry</button>
    </div>

    <script>
        // Spawns background ambient text elements upon load
        function spawnStaticElements() {
            for(let i=0; i<25; i++) {
                createNoElement(false);
            }
        }

        // Functional core loop to generate randomized text strings
        function createNoElement(isChaosClicked) {
            const el = document.createElement('div');
            el.classList.add('floating-no');
            el.innerText = "NONONO";
            
            // Layout calculations
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            
            el.style.left = startX + 'px';
            el.style.top = startY + 'px';
            
            // Inject random target trajectories
            const targetX = (Math.random() - 0.5) * 300;
            const targetY = (Math.random() - 0.5) * 300;
            el.style.setProperty('--x', targetX + 'px');
            el.style.setProperty('--y', targetY + 'px');
            
            // Adjust visual characteristics based on invocation trigger source
            if (isChaosClicked) {
                el.style.color = Math.random() > 0.5 ? '#ff0055' : '#00ffcc';
                el.style.textShadow = '0 0 8px currentColor';
                el.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
                el.style.animationDuration = '2s';
                el.style.zIndex = "5";
            } else {
                el.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                el.style.animationDuration = (Math.random() * 5 + 5) + 's';
                el.style.animationDelay = (Math.random() * -5) + 's';
            }

            document.body.appendChild(el);

            // Housekeeping garbage collection
            setTimeout(() => { el.remove(); }, isChaosClicked ? 2000 : 10000);
        }

        // Chaos generation engine attached directly to Button Click events
        function injectChaos() {
            // Rapidly burst 8 high-velocity, brightly colored text arrays around viewport center
            for(let i=0; i<8; i++) {
                createNoElement(true);
            }
        }

        // Initialize script logic
        spawnStaticElements();
    </script>
</body>
</html>
