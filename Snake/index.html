<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh's Snake Game</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --game-bg: #161b22;
            --snake-color: #ff5f56;
            --food-color: #00ff66;
            --border-color: #30363d;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 95, 86, 0.5);
            margin-bottom: 5px;
        }

        .score-board {
            font-size: 1.2rem;
            color: #8b949e;
            font-weight: bold;
        }

        .score-value {
            color: var(--snake-color);
        }

        #gameCanvas {
            background-color: var(--game-bg);
            border: 4px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #8b949e;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(13, 17, 23, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay h2 {
            font-size: 3rem;
            color: var(--snake-color);
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--snake-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #ff3b30;
        }
    </style>
</head>
<body>

    <header>
        <h1>Harsh's Snake</h1>
        <div class="score-board">Score: <span id="score" class="score-value">0</span></div>
    </header>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="instructions">Use Arrow Keys or WASD to control the snake.</div>

    <div id="gameOverScreen" class="overlay">
        <h2>Game Over!</h2>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverScreen = document.getElementById("gameOverScreen");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let changingDirection = false;

        function startGame() {
            generateFood();
            gameInterval = setInterval(update, 100);
        }

        function update() {
            changingDirection = false;
            moveSnake();

            if (checkGameOver()) {
                clearInterval(gameInterval);
                gameOverScreen.classList.add("active");
                return;
            }

            draw();
        }

        function draw() {
            // Background
            ctx.fillStyle = "#161b22";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food
            ctx.fillStyle = "#00ff66";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ff66";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Snake
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#ff5f56";
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#ff5f56" : "#cc4c45";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            // Fixed indexing here: accessing head coordinates via snake[0]
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function checkGameOver() {
            const head = snake[0];

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            if (changingDirection) return;

            const keyPressed = event.key.toLowerCase();
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === "arrowleft" || keyPressed === "a") && !goingRight) {
                dx = -1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === "arrowup" || keyPressed === "w") && !goingDown) {
                dx = 0; dy = -1; changingDirection = true;
            }
            if ((keyPressed === "arrowright" || keyPressed === "d") && !goingLeft) {
                dx = 1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === "arrowdown" || keyPressed === "s") && !goingUp) {
                dx = 0; dy = 1; changingDirection = true;
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameOverScreen.classList.remove("active");
            clearInterval(gameInterval);
            startGame();
        }

        startGame();
    </script>
</body>
</html>
