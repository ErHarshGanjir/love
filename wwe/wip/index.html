<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>ChequeBook Pro</title>

<!-- App Icon -->
<link rel="icon" type="image/png" href="ChequeBook favicon.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    background:#ffffff;
}

/* =========================
   IFRAME
========================= */

#content-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    z-index:1;
}

/* =========================
   PREMIUM DYNAMIC ISLAND
========================= */

#dynamicIsland{

    position:fixed;

    top:15px;
    left:50%;

    transform:translateX(-50%);

    width:430px;
    max-width:92vw;

    height:76px;

    background:
    rgba(8,12,20,.88);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:
    1px solid rgba(255,255,255,.08);

    border-radius:999px;

    z-index:99999999;

    display:flex;
    align-items:center;

    gap:15px;

    padding:0 18px;

    box-shadow:
    0 15px 45px rgba(0,0,0,.35),
    0 0 25px rgba(59,130,246,.15);

    animation:islandOpen .8s ease;
}

.island-icon{
    width:42px;
    text-align:center;
    font-size:24px;
}

.island-text{
    flex:1;
    overflow:hidden;
}

#islandTitle{
    color:#ffffff;
    font-size:15px;
    font-weight:700;
    white-space:nowrap;
}

#islandSub{
    color:#cbd5e1;
    font-size:12px;
    margin-top:3px;
    white-space:nowrap;
}

.ring{

    width:28px;
    height:28px;

    border-radius:50%;

    border:
    3px solid rgba(255,255,255,.15);

    border-top:
    3px solid #38bdf8;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes islandOpen{
    from{
        opacity:0;
        transform:
        translateX(-50%)
        translateY(-30px);
    }

    to{
        opacity:1;
        transform:
        translateX(-50%)
        translateY(0);
    }
}

/* =========================
   INSTALL BUTTON
========================= */

#installBtn{

    position:fixed;

    right:15px;
    bottom:20px;

    z-index:999999999;

    background:#0f172a;

    color:white;

    border:none;

    border-radius:12px;

    padding:12px 18px;

    cursor:pointer;

    font-size:14px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.25);

    display:none;
}

#installBtn:hover{
    transform:translateY(-2px);
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

    #dynamicIsland{
        height:72px;
    }

    #islandTitle{
        font-size:14px;
    }

    #islandSub{
        font-size:11px;
    }

}

</style>
</head>

<body>

<!-- PREMIUM DYNAMIC ISLAND -->

<div id="dynamicIsland">

    <div class="island-icon" id="islandIcon">
        🔄
    </div>

    <div class="island-text">

        <div id="islandTitle">
            Connecting Database
        </div>

        <div id="islandSub">
            Initializing secure connection...
        </div>

    </div>

    <div class="ring"></div>

</div>

<!-- IFRAME -->

<iframe
id="content-frame"
allow="clipboard-read; clipboard-write"
src="https://script.google.com/macros/s/AKfycbx2KVyvFiSVQE5EF8IDl-3BiL7RN2uW4QcSNiP7g25wEP6GYzfaJWWmtVTwckEYnCsF7w/exec">
</iframe>

<!-- INSTALL BUTTON -->

<button id="installBtn">
⬇ Install App
</button>

<script>

/* =========================
   INSTALL APP
========================= */

let deferredPrompt;

const installBtn =
document.getElementById("installBtn");

window.addEventListener(
"beforeinstallprompt",
(e)=>{

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display = "block";

    installBtn.addEventListener("click",()=>{

        installBtn.style.display = "none";

        deferredPrompt.prompt();

        deferredPrompt.userChoice.then(()=>{

            deferredPrompt = null;

        });

    });

});

/* =========================
   DYNAMIC ISLAND FLOW
========================= */

const island =
document.getElementById("dynamicIsland");

const title =
document.getElementById("islandTitle");

const sub =
document.getElementById("islandSub");

const icon =
document.getElementById("islandIcon");

const ring =
document.querySelector(".ring");

/* 3 sec */

setTimeout(()=>{

    title.innerHTML =
    "🔒 Verifying Security";

    sub.innerHTML =
    "Checking encrypted credentials...";

},3000);

/* 7 sec */

setTimeout(()=>{

    title.innerHTML =
    "☁️ Connecting Database";

    sub.innerHTML =
    "Fetching cloud records...";

},7000);

/* 11 sec */

setTimeout(()=>{

    title.innerHTML =
    "🔄 Syncing Records";

    sub.innerHTML =
    "Synchronizing application data...";

},11000);

/* 14 sec */

setTimeout(()=>{

    icon.innerHTML = "✅";

    title.innerHTML =
    "Connection Successful";

    sub.innerHTML =
    "Database connected successfully";

    ring.style.display = "none";

},14000);

/* 16 sec */

setTimeout(()=>{

    island.style.transition =
    "all .8s ease";

    island.style.opacity =
    "0";

    island.style.transform =
    "translateX(-50%) translateY(-30px)";

    setTimeout(()=>{

        island.remove();

    },800);

},16000);

/* =========================
   SERVICE WORKER
========================= */

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker
        .register("service-worker.js")
        .catch(err=>console.log(err));

    });

}

</script>

</body>
</html>
