<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Puchuuuuu!</title>
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b12;
            --accent-primary: #ff3366;
            --accent-secondary: #ff66b2;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Glow Elements */
        .background-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .glow-circle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
        }

        .glow-1 { width: 600px; height: 600px; top: -200px; left: -200px; }
        .glow-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            color: var(--accent-primary);
            font-size: 20px;
            opacity: 0;
            animation: floatUp 4s infinite linear;
        }

        /* Typography */
        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--accent-primary);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .message-box {
            font-size: 1.1rem;
            line-height: 1.8;
            min-height: 120px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .signature {
            font-size: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards;
            animation-delay: 4.5s; /* Appears after typing finishes */
        }

        .signature span {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--accent-secondary);
            display: block;
            margin-top: 5px;
        }

        /* Interactive Button */
        .btn {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.5);
        }

        /* Animations */
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing cursor effect */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: var(--accent-primary);
            margin-left: 2px;
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-glow">
        <div class="glow-circle glow-1"></div>
        <div class="glow-circle glow-2"></div>
    </div>

    <div class="container">
        <h1 class="title">Happy Birthday Putchu!</h1>
        
        <div class="message-box">
            <span id="typing-text"></span><span class="cursor" id="cursor"></span>
        </div>

        <div class="signature">
            With all my love, 
            <span>❤️ Depika</span>
        </div>

        <button class="btn" onclick="createConfetti()">Celebrate ✨</button>
    </div>

    <script>
        // Typing Effect Configuration
        const message = "To the most amazing person in my life, wishing you a birthday as beautiful and special as you are. Thank you for bringing so much happiness into my world every single day. I am incredibly lucky to have you. I love you so much! Always.";
        const typingSpeed = 40; 
        let i = 0;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typing-text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Hide cursor when finished
                document.getElementById("cursor").style.display = 'none';
            }
        }

        // Start typing on load
        window.onload = function() {
            typeWriter();
            generateHearts();
        };

        // Ambient Floating Hearts
        function generateHearts() {
            const body = document.body;
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }, 600);
        }

        // Celebrate Button Click Effect (Burst of hearts)
        function createConfetti() {
            for(let i=0; i<20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '✨', '💖', '🎉'][Math.floor(Math.random() * 4)];
                heart.style.left = '50vw';
                heart.style.top = '50vh';
                heart.style.animation = 'none'; // reset
                
                // Random explosion direction
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 200 + 50;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;

                heart.style.transition = 'all 1s ease-out';
                heart.style.position = 'fixed';
                heart.style.zIndex = '10';
                
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.transform = `translate(${x}px, ${y}px) scale(1.5)`;
                    heart.style.opacity = '0';
                }, 50);

                setTimeout(() => {
                    heart.remove();
                }, 1050);
            }
        }
    </script>
</body>
</html>
